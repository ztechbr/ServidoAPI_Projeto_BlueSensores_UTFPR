services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-bluet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bluet_secret}
      POSTGRES_DB: ${POSTGRES_DB:-bluet}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts_bd/create_table.sql:/docker-entrypoint-initdb.d/01-create_table.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-bluet} -d ${POSTGRES_DB:-bluet}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build: .
    restart: unless-stopped
    ports:
      - "${API_PORT:-8001}:8001"
    environment:
      PORT: "8001"
      DATABASE_URL: postgresql://${POSTGRES_USER:-bluet}:${POSTGRES_PASSWORD:-bluet_secret}@db:5432/${POSTGRES_DB:-bluet}
      API_TOKEN: ${API_TOKEN:-}
      SOAP_NAMESPACE: ${SOAP_NAMESPACE:-}
      SOAP_PUBLIC_URL: ${SOAP_PUBLIC_URL:-}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
